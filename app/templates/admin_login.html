{% extends "base.html" %}
{% block title %}Panel | A.S.E.{% endblock %}
{% block content %}
<section class="admin-auth">
  <div class="admin-card">
    <p class="eyebrow">Panel de publicacion</p>
    <h1>Entrar al panel</h1>
    <p>Las credenciales de acceso se definen al crear el entorno y el usuario administrador inicial.</p>
    {% if error %}
    <p class="error-text">{{ error }}</p>
    {% endif %}
    <form method="post" action="/admin/login" class="stack-form">
      <label>
        Usuario
        <input type="text" name="username" required>
      </label>
      <label>
        Contraseña
        <input type="password" name="password" required>
      </label>
      <button class="button primary" type="submit">Ingresar</button>
    </form>
  </div>
</section>
{% endblock %}
