{% extends "base.html" %}
{% block title %}{{ "Editar" if entry else "Nueva" }} entrada | A.S.E.{% endblock %}
{% block content %}
<section class="admin-form-wrap">
  <div class="page-intro">
    <p class="eyebrow">Panel</p>
    <h1>{{ "Editar" if entry else "Nueva" }} entrada</h1>
  </div>
  <form method="post" action="/admin/entries/save" class="stack-form">
    {% if entry %}
    <input type="hidden" name="entry_id" value="{{ entry.id }}">
    {% endif %}
    <label>
      Titulo
      <input type="text" name="title" value="{{ entry.title if entry else '' }}" required>
    </label>
    <label>
      Resumen
      <textarea name="summary" rows="3">{{ entry.summary if entry else '' }}</textarea>
    </label>
    <div class="markdown-editor" data-markdown-editor>
      <div class="editor-toolbar" role="toolbar" aria-label="Herramientas de formato">
        <button type="button" data-action="bold">Negrita</button>
        <button type="button" data-action="italic">Cursiva</button>
        <button type="button" data-action="heading">Titulo</button>
        <button type="button" data-action="quote">Cita</button>
        <button type="button" data-action="list">Lista</button>
        <button type="button" data-action="link">Link</button>
        <button type="button" data-action="image-upload">Subir imagen</button>
        <button type="button" data-action="preview">Previsualizar</button>
      </div>
      <input type="file" accept="image/png,image/jpeg,image/webp,image/gif" data-image-input class="visually-hidden-file-input" tabindex="-1" aria-hidden="true">
      <label>
        Contenido
        <textarea name="content" rows="14" required data-markdown-input data-preview-target="entry-content-preview">{{ entry.content if entry else '' }}</textarea>
      </label>
      <section class="markdown-preview" data-preview-panel hidden>
        <div class="preview-header">
          <strong>Previsualizacion</strong>
          <button type="button" data-action="edit">Volver a editar</button>
        </div>
        <div class="content-card" id="entry-content-preview"></div>
      </section>
    </div>
    <div class="form-split">
      <label>
        Seccion
        <select name="kind">
          <option value="blog" {% if entry and entry.kind == "blog" %}selected{% endif %}>Blog</option>
          <option value="publication" {% if entry and entry.kind == "publication" %}selected{% endif %}>Publicacion</option>
        </select>
      </label>
      <label>
        Autor
        {% if user.is_admin %}
        <select name="author_name">
          {% for author in author_users %}
          <option value="{{ author.display_name }}" {% if (entry and entry.author_name == author.display_name) or (not entry and loop.first) %}selected{% endif %}>{{ author.display_name }}</option>
          {% endfor %}
        </select>
        {% else %}
        <input type="text" name="author_name" value="{{ user.display_name }}" readonly>
        {% endif %}
      </label>
    </div>
    <label>
      Categoria
      <input list="categories" type="text" name="category_name" value="{{ entry.category.name if entry and entry.category else '' }}" placeholder="Cuentos, Poemas, Otros">
      <datalist id="categories">
        {% for category in categories %}
        <option value="{{ category.name }}"></option>
        {% endfor %}
      </datalist>
    </label>
    <label>
      Etiquetas
      <input type="text" name="tag_names" value="{{ entry.tags | map(attribute='name') | join(', ') if entry else '' }}" placeholder="infantil, fantasia, amistad">
    </label>
    <label class="checkbox-row">
      <input type="checkbox" name="is_published" {% if not entry or entry.is_published %}checked{% endif %}>
      Publicada
    </label>
    <label class="checkbox-row">
      <input type="checkbox" name="featured" {% if entry and entry.featured %}checked{% endif %}>
      Destacar en inicio
    </label>
    <div class="admin-actions">
      <button class="button primary" type="submit">Guardar</button>
      <a class="button secondary" href="/admin">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', path='/js/admin_editor.js') }}"></script>
{% endblock %}
